    <style>
        .st0{
            stroke: black;
            stroke-width: 5px;
            stroke-dasharray: 3000;
            animation: effectText 5s ease-in;
        }
        @keyframes effectText {
            from{
                fill:transparent;
                stroke-dashoffset: 3000;
            }to{
                fill: black;
                stroke-dashoffset: 0;
            }
        }
        .st1{
            stroke: black;
            stroke-width: 10px;
            stroke-dasharray: 2000;
            stroke-dashoffset: 2000;

            opacity: 0; /* invisible at start */
            animation: effectText2 5s ease-in 1s forwards;
        }

        @keyframes effectText2 {
            from{
                opacity: 0;
                fill: transparent;
                stroke-dashoffset: 2000;
            }
            to{
                opacity: 1;        /* 100% visible */
                fill: black;
                stroke-dashoffset: 0;
            }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .fade-in-image {
            animation: fadeIn 2s ease-in-out;
        }
        .fade-in-text {
            animation: fadeIn 2s ease-in 3s forwards;
        }

        
        .image-diagonal {
            position: relative;
            animation: diagonalFloat 5s ease-in-out forwards;
        }
        .fade-in-shake {
            display: inline-block; /* required for transform */
            transform-origin: center center;
            animation:
                fadeIn 2s ease-in-out forwards,
                wobble 1s ease-in-out 2s infinite;
        }
        @keyframes wobble {
            0%, 100% {
                transform: rotate(0deg);
            }

            20% {
                transform: rotate(-8deg); /* left side up */
            }

            40% {
                transform: rotate(8deg); /* right side up */
            }

            60% {
                transform: rotate(-6deg);
            }

            80% {
                transform: rotate(6deg);
            }
        }
        @keyframes diagonalFloat {
            from {
                transform: translate(600px, -100px) scale(0.4);
            }
            to {
                transform: translate(0, 0) scale(1);
            }
        }

/* Container */
.church-scene {
  position: relative;
  perspective: 1200px;
  overflow: hidden;
  cursor: pointer;
  background: black;
}

/* Inside church */
.church-scene .inside {
  position: absolute;
  inset: 0;
  background: url("image/inside_church.png") center/cover no-repeat;

  /* transform: scale(1.1) translateZ(-500px); */
  z-index: 1;
}

/* Doors */
.church-scene .doors {
  position: absolute;
  inset: 0;
  display: flex;
  z-index: 3;
}

.church-scene .door {
  width: 50%;
  height: 100%;
  object-fit: cover;
  transition: transform 1.6s ease-in-out;
}

/* Hinges */
.church-scene .left  { transform-origin: left center; }
.church-scene .right { transform-origin: right center; }

/* OPEN STATE (inward) */
.church-scene.open .left {
  transform: rotateY(90deg);
}

.church-scene.open .right {
  transform: rotateY(-90deg);
}

.church-scene.open .inside {
  animation: enterChurch 6.5s cubic-bezier(.16, .84, .44, 1) forwards;
  animation-delay: 0.8s; /* slight wait after door opens */
}
/* @keyframes enterChurch {

  0% {

  }

  35% {

  }

  60% {
    transform: scale(1.6) translateZ(80px) translateY(-6px);
  }

  100% {
    transform: scale(2.2) translateZ(260px) translateY(-10px);
  }
} */


.zoom-away {
  animation: zoomAway 5s ease-in forwards;
  transform-origin: center;
}

@keyframes zoomAway {
  from {
    transform: scale(1);
    opacity: 1;
    filter: blur(0);
  }
  to {
    transform: scale(8);
    opacity: 0;
    filter: blur(6px);
  }
}
body.entered {
  background: url("image/inside_church.png") center/cover no-repeat fixed;
  transition: background 1.5s ease-in-out;
  opacity: 0;
  transition: opacity 1s ease;
}

<body class=" relative flex items-center justify-center h-dvh bg-[#f5ebe0] border-4">

<script>
  const scene = document.getElementById("churchScene");
  const page = document.body;
  const content = document.getElementById("pageContent");

  window.addEventListener("pointerdown", () => {
    if (!scene.classList.contains("open")) {

      // 1️⃣ Open doors
      scene.classList.add("open");
      
        var audio = document.getElementById("myAudio");
        audio.play();
      // 2️⃣ Wait for doors to open
      setTimeout(() => {
        content.classList.add("zoom-away");
      }, 1600); // matches door transition

      // 3️⃣ Switch full-page background AFTER zoom-away
      setTimeout(() => {
      //   page.classList.add("entered");
      // window.location.href = "inside.html";
      sessionStorage.setItem('audioAllowed', 'true');
      window.location.href = "home.html";
      }, 3800); // door + zoom-away timing
    }
  });
</script>
